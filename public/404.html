<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>404 — This plot is empty · Subscription Graveyard</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: grid; place-items: center;
      background: radial-gradient(60% 50% at 50% 10%, rgba(122,108,240,.12), transparent), #07071c;
      color: #cfd0ef; font-family: "Spectral", Georgia, serif; text-align: center; padding: 24px;
    }
    .stone {
      max-width: 420px; padding: 4rem 2.5rem 3rem;
      background: linear-gradient(170deg, #3b3272, #211c45);
      border: 1px solid rgba(141,134,201,.35);
      border-radius: 130px 130px 12px 12px;
      box-shadow: 0 20px 60px rgba(4,4,16,.6);
    }
    h1 { font-family: "Cinzel", serif; font-size: 3.2rem; letter-spacing: .1em; color: #e9e7ff; }
    .rip { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: .7rem; letter-spacing: .5em; color: #a3a0d6; margin-bottom: .8rem; }
    p { font-style: italic; margin-top: .8rem; color: #a3a0d6; }
    a {
      display: inline-block; margin-top: 2rem; padding: .8rem 1.8rem;
      font-family: ui-monospace, Menlo, Consolas, monospace; font-size: .72rem; letter-spacing: .18em;
      color: #f0c96e; border: 1px solid rgba(240,201,110,.65); border-radius: 999px; text-decoration: none;
      transition: background-color .2s ease, color .2s ease;
    }
    a:hover { background: #f0c96e; color: #07071c; }
    a:focus-visible { outline: 2px solid #f0c96e; outline-offset: 3px; }
  </style>
</head>
<body>
  <main class="stone">
    <p class="rip">R.I.P · 404</p>
    <h1>This plot is empty.</h1>
    <p>Whatever you were looking for was either buried, exhumed, or never subscribed to at all.</p>

  </main>
</body>
</html>
