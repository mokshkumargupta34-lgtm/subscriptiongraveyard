<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up — Subscription Graveyard</title>
  <meta name="description" content="Create your Subscription Graveyard account. Google sign-in uses read-only gmail.readonly scope." />
  <meta name="theme-color" content="#07071c" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%26%23129702;%3C/text%3E%3C/svg%3E" />

  <style>
    :root {
      --night-0: #07071c;
      --night-1: #111133;
      --violet: #7a6cf0;
      --gold: #f0c96e;
      --moon: #e9e7ff;
      --ink: #cfd0ef;
      --muted: #8f8cc9;
      --font-display: "Cinzel", "Times New Roman", serif;
      --font-body: "Spectral", Georgia, serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { overflow-x: clip; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--night-0);
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 24px;
      /* containing block for the absolute glow blobs, so overflow:hidden clips them */
      position: relative;
    }

    :focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; border-radius: 4px; }
    button { cursor: pointer; font: inherit; }

    /* ---------- aether flow particle network ---------- */
    .aether {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .bg-tint {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(122, 108, 240, 0.12), transparent 40%);
      pointer-events: none;
    }
    .glow { position: absolute; border-radius: 50%; pointer-events: none; }
    .glow--top {
      top: -25vh; left: 50%; transform: translateX(-50%);
      width: 100vh; height: 60vh;
      background: rgba(122, 108, 240, 0.2);
      filter: blur(100px);
      animation: breathe 8s ease-in-out infinite alternate;
    }
    .glow--corner {
      bottom: -20vh; right: 12%;
      width: 60vh; height: 60vh;
      background: rgba(122, 108, 240, 0.15);
      filter: blur(80px);
      animation: breathe 6s ease-in-out 1s infinite alternate;
    }
    .glow--gold1, .glow--gold2 {
      width: 260px; height: 260px;
      background: rgba(240, 201, 110, 0.1);
      filter: blur(100px);
      opacity: 0.3;
      animation: breathe 5s ease-in-out infinite alternate;
    }
    .glow--gold1 { left: 22%; top: 30%; }
    .glow--gold2 { right: 30%; bottom: 28%; animation-delay: 1s; }
    @keyframes breathe { from { opacity: 0.55; transform: scale(0.98); } to { opacity: 1; transform: scale(1.04); } }
    .glow--top { transform-origin: center; }

    /* ---------- card ---------- */
    .wrap {
      position: relative; z-index: 2;
      width: 100%; max-width: 420px;
      animation: rise 0.8s ease both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .card {
      position: relative;
      background: rgba(10, 10, 31, 0.6);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(122, 108, 240, 0.2);
      border-radius: 18px;
      padding: 2.2rem 2rem;
      box-shadow: 0 24px 70px rgba(4, 4, 16, 0.6), 0 0 26px rgba(122, 108, 240, 0.16);
      overflow: hidden;
    }
    .card::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(122, 108, 240, 0.05), transparent 60%);
      pointer-events: none;
    }

    /* traveling light beams around the border */
    .beam { position: absolute; pointer-events: none; opacity: 0; }
    .beam--top {
      top: 0; left: 0; height: 2px; width: 50%;
      background: linear-gradient(90deg, transparent, var(--violet), transparent);
      animation: beam-x 4s ease-in-out infinite;
    }
    .beam--right {
      top: 0; right: 0; width: 2px; height: 50%;
      background: linear-gradient(180deg, transparent, var(--gold), transparent);
      animation: beam-y 4s ease-in-out 1s infinite;
    }
    .beam--bottom {
      bottom: 0; right: 0; height: 2px; width: 50%;
      background: linear-gradient(90deg, transparent, var(--violet), transparent);
      animation: beam-x-rev 4s ease-in-out 2s infinite;
    }
    .beam--left {
      bottom: 0; left: 0; width: 2px; height: 50%;
      background: linear-gradient(180deg, transparent, var(--gold), transparent);
      animation: beam-y-rev 4s ease-in-out 3s infinite;
    }
    @keyframes beam-x     { 0% { transform: translateX(-100%); opacity: 0; } 10%, 60% { opacity: 0.8; } 75%, 100% { transform: translateX(200%); opacity: 0; } }
    @keyframes beam-x-rev { 0% { transform: translateX(100%); opacity: 0; } 10%, 60% { opacity: 0.8; } 75%, 100% { transform: translateX(-200%); opacity: 0; } }
    @keyframes beam-y     { 0% { transform: translateY(-100%); opacity: 0; } 10%, 60% { opacity: 0.8; } 75%, 100% { transform: translateY(200%); opacity: 0; } }
    @keyframes beam-y-rev { 0% { transform: translateY(100%); opacity: 0; } 10%, 60% { opacity: 0.8; } 75%, 100% { transform: translateY(-200%); opacity: 0; } }

    /* ---------- header ---------- */
    .card__head { text-align: center; margin-bottom: 1.9rem; position: relative; }
    .emblem {
      width: 64px; height: 64px;
      margin: 0 auto 1rem;
      border-radius: 50%;
      border: 2px solid rgba(240, 201, 110, 0.3);
      background: linear-gradient(135deg, rgba(122, 108, 240, 0.1), transparent);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      animation: pop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .card__title {
      font-family: var(--font-display); font-weight: 700;
      font-size: 1.65rem; letter-spacing: 0.05em;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(240, 201, 110, 0.3);
    }
    .card__sub { margin-top: 0.4rem; font-size: 0.92rem; color: rgba(233, 231, 255, 0.6); }

    /* ---------- google button ---------- */
    .btn-google {
      position: relative;
      width: 100%; height: 48px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: var(--violet);
      color: #fff;
      border: none; border-radius: 10px;
      font-family: var(--font-body); font-weight: 500; font-size: 0.95rem;
      box-shadow: 0 8px 26px rgba(122, 108, 240, 0.3);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }
    .btn-google:hover { transform: scale(1.02); box-shadow: 0 10px 40px rgba(122, 108, 240, 0.5); }
    .btn-google:active { transform: scale(0.98); }
    .btn-google::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
      transform: translateX(-120%);
      transition: transform 0.8s ease;
    }
    .btn-google:hover::after { transform: translateX(120%); }
    .btn-google svg { width: 20px; height: 20px; flex: none; }

    /* ---------- divider ---------- */
    .divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.5rem 0;
      color: rgba(233, 231, 255, 0.4);
      font-size: 0.74rem;
      animation: shimmer 3s ease-in-out infinite;
    }
    .divider::before, .divider::after {
      content: ""; flex: 1; height: 1px;
      background: rgba(122, 108, 240, 0.2);
    }
    @keyframes shimmer { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

    /* ---------- inputs ---------- */
    .field { position: relative; margin-bottom: 1rem; }
    .field svg.icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px;
      color: rgba(233, 231, 255, 0.4);
      transition: color 0.3s ease;
      pointer-events: none;
    }
    .field input {
      width: 100%; height: 46px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(122, 108, 240, 0.2);
      border-radius: 10px;
      color: var(--moon);
      font-family: var(--font-body); font-size: 0.95rem;
      padding: 0 40px 0 38px;
      transition: border-color 0.3s ease, background 0.3s ease;
    }
    .field input::placeholder { color: rgba(233, 231, 255, 0.3); }
    .field input:focus {
      outline: none;
      border-color: var(--violet);
      background: rgba(255, 255, 255, 0.09);
      box-shadow: 0 0 0 3px rgba(122, 108, 240, 0.18);
    }
    .field input:focus ~ svg.icon, .field:focus-within svg.icon { color: var(--violet); }

    .eye {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none;
      color: rgba(233, 231, 255, 0.4);
      border-radius: 8px;
      transition: color 0.3s ease;
    }
    .eye:hover { color: var(--violet); }
    .eye svg { width: 16px; height: 16px; }
    .eye .eye-off { display: none; }
    .eye.show .eye-on { display: none; }
    .eye.show .eye-off { display: block; }

    /* ---------- create account button ---------- */
    .btn-create {
      position: relative;
      width: 100%; height: 46px;
      margin-top: 1.3rem;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      color: var(--moon);
      border: 1px solid rgba(240, 201, 110, 0.3);
      border-radius: 10px;
      font-size: 0.92rem;
      transition: background 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
    }
    .btn-create:hover {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 30px rgba(240, 201, 110, 0.2);
      transform: scale(1.02);
    }
    .btn-create:active { transform: scale(0.98); }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(233, 231, 255, 0.7);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .is-loading .spinner { display: block; }
    .is-loading .btn-label { display: none; }

    /* ---------- footer links ---------- */
    .card__signin {
      text-align: center; margin-top: 1.5rem;
      font-size: 0.78rem; color: rgba(233, 231, 255, 0.5);
    }
    .card__signin a { color: var(--gold); text-decoration: none; font-weight: 500; }
    .card__signin a:hover { color: rgba(240, 201, 110, 0.8); }

    .card__scope {
      text-align: center; margin-top: 0.9rem;
      font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.12em;
      color: rgba(233, 231, 255, 0.3);
    }

    .back {
      position: absolute; top: 22px; left: 26px; z-index: 3;
      font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.22em;
      color: var(--muted); text-decoration: none;
      transition: color 0.2s ease;
    }
    .back:hover { color: var(--moon); }

    /* ---------- reduced motion ---------- */
    @media (prefers-reduced-motion: reduce) {
      .glow--top, .glow--corner, .glow--gold1, .glow--gold2,
      .beam, .divider, .wrap, .emblem { animation: none; }
      .beam, .aether { display: none; }
      .wrap { opacity: 1; transform: none; }
      .btn-google, .btn-google:hover, .btn-create, .btn-create:hover { transition: none; transform: none; }
      .btn-google::after { display: none; }
    }
  </style>
</head>
<body>

  <a class="back" href="index.html">&larr; BACK TO THE GRAVEYARD</a>

  <canvas class="aether" id="aether" aria-hidden="true"></canvas>
  <div class="bg-tint" aria-hidden="true"></div>
  <div class="glow glow--top" aria-hidden="true"></div>
  <div class="glow glow--corner" aria-hidden="true"></div>
  <div class="glow glow--gold1" aria-hidden="true"></div>
  <div class="glow glow--gold2" aria-hidden="true"></div>

  <main class="wrap">
    <div class="card">
      <span class="beam beam--top" aria-hidden="true"></span>
      <span class="beam beam--right" aria-hidden="true"></span>
      <span class="beam beam--bottom" aria-hidden="true"></span>
      <span class="beam beam--left" aria-hidden="true"></span>

      <header class="card__head">
        <div class="emblem" aria-hidden="true">&#9904;&#65039;</div>
        <h1 class="card__title">Subscription Graveyard</h1>
        <p class="card__sub">Lay your unused subscriptions to rest</p>
      </header>

      <button class="btn-google" id="btn-google" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span class="btn-label">Sign up with Google</span>
        <span class="spinner" aria-hidden="true"></span>
      </button>

      <div class="divider" aria-hidden="true">or continue with email</div>

      <form id="signup-form" novalidate>
        <div class="field">
          <label class="visually-hidden" for="email" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">Email address</label>
          <input id="email" type="email" name="email" placeholder="Email address" autocomplete="email" required />
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/>
          </svg>
        </div>

        <div class="field">
          <label for="password" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">Password</label>
          <input id="password" type="password" name="password" placeholder="Password" autocomplete="new-password" minlength="8" required />
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>
          </svg>
          <button class="eye" id="eye" type="button" aria-label="Show password" aria-pressed="false">
            <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M2 12s3.5-6 10-6c1.6 0 3 .35 4.3.9M22 12s-3.5 6-10 6c-1.6 0-3-.35-4.3-.9"/><path d="m4 4 16 16"/>
            </svg>
          </button>
        </div>

        <button class="btn-create" id="btn-create" type="submit">
          <span class="btn-label">Create Account</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>
      </form>

      <p class="card__signin">Already have an account? <a href="#">Sign in</a></p>
      <p class="card__scope">GOOGLE SIGN-IN USES READ-ONLY ACCESS (GMAIL.READONLY SCOPE)</p>
    </div>
  </main>

  <script>
    (() => {
      "use strict";
      const google = document.getElementById("btn-google");
      const form = document.getElementById("signup-form");
      const create = document.getElementById("btn-create");
      const eye = document.getElementById("eye");
      const password = document.getElementById("password");

      function load(btn) {
        if (btn.classList.contains("is-loading")) return;
        btn.classList.add("is-loading");
        setTimeout(() => btn.classList.remove("is-loading"), 2000);
      }

      google.addEventListener("click", () => load(google));
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        if (form.reportValidity()) load(create);
      });

      eye.addEventListener("click", () => {
        const show = password.type === "password";
        password.type = show ? "text" : "password";
        eye.classList.toggle("show", show);
        eye.setAttribute("aria-label", show ? "Hide password" : "Show password");
        eye.setAttribute("aria-pressed", show ? "true" : "false");
      });

      /* ---------- aether flow background (adapted from 21st.dev) ---------- */
      if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) initAether();

      function initAether() {
        const canvas = document.getElementById("aether");
        const ctx = canvas.getContext("2d");
        const mouse = { x: null, y: null, radius: 200 };
        let particles = [];
        let raf = 0;
        let running = false;

        class Particle {
          constructor(x, y, dx, dy, size) {
            this.x = x; this.y = y;
            this.dx = dx; this.dy = dy;
            this.size = size;
          }
          update() {
            if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
            if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;

            if (mouse.x !== null) {
              const mdx = mouse.x - this.x;
              const mdy = mouse.y - this.y;
              const dist = Math.sqrt(mdx * mdx + mdy * mdy);
              if (dist < mouse.radius + this.size && dist > 0) {
                const force = (mouse.radius - dist) / mouse.radius;
                this.x -= (mdx / dist) * force * 5;
                this.y -= (mdy / dist) * force * 5;
              }
            }
            this.x += this.dx;
            this.y += this.dy;

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(170, 155, 255, 0.8)";
            ctx.fill();
          }
        }

        function init() {
          particles = [];
          /* cap the count so 4K displays don't melt in the O(n²) connect pass */
          const n = Math.min(180, (canvas.width * canvas.height) / 9000);
          for (let i = 0; i < n; i++) {
            const size = Math.random() * 2 + 1;
            particles.push(new Particle(
              Math.random() * (canvas.width - size * 4) + size * 2,
              Math.random() * (canvas.height - size * 4) + size * 2,
              Math.random() * 0.4 - 0.2,
              Math.random() * 0.4 - 0.2,
              size
            ));
          }
        }

        function connect() {
          const threshold = (canvas.width / 7) * (canvas.height / 7);
          for (let a = 0; a < particles.length; a++) {
            for (let b = a; b < particles.length; b++) {
              const dx = particles[a].x - particles[b].x;
              const dy = particles[a].y - particles[b].y;
              const distSq = dx * dx + dy * dy;
              if (distSq < threshold) {
                const o = Math.max(0, Math.min(1, 1 - distSq / 20000));
                if (o <= 0) continue;
                let near = false;
                if (mouse.x !== null) {
                  const mdx = particles[a].x - mouse.x;
                  const mdy = particles[a].y - mouse.y;
                  near = Math.sqrt(mdx * mdx + mdy * mdy) < mouse.radius;
                }
                ctx.strokeStyle = near
                  ? "rgba(233, 231, 255, " + o.toFixed(3) + ")"   /* moonlight near the cursor */
                  : "rgba(150, 135, 245, " + (o * 0.55).toFixed(3) + ")"; /* violet elsewhere */
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(particles[a].x, particles[a].y);
                ctx.lineTo(particles[b].x, particles[b].y);
                ctx.stroke();
              }
            }
          }
        }

        function animate() {
          if (!running) return;
          raf = requestAnimationFrame(animate);
          ctx.fillStyle = "#07071c";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          for (const p of particles) p.update();
          connect();
        }

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          init();
        }
        resize();
        window.addEventListener("resize", resize);

        window.addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener("mouseout", () => { mouse.x = null; mouse.y = null; });

        function start() { if (!running) { running = true; animate(); } }
        function stop() { running = false; cancelAnimationFrame(raf); }
        document.addEventListener("visibilitychange", () => (document.hidden ? stop() : start()));
        start();
      }
    })();
  </script>
</body>
</html>
